name: Release macOS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-macos:
    name: Build macOS release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm web:typecheck

      - name: Test Rust backend
        run: cargo test
        working-directory: src-tauri

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "VPScope ${{ github.ref_name }}"
          releaseBody: |
            Automated macOS build for VPScope.

            This release is created as a draft so artifacts can be checked before publishing.
          releaseDraft: true
          prerelease: true
