name: Release macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-macos:
    name: Build macOS release
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_PRIVATE: ${{ secrets.APPLE_API_KEY_PRIVATE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm web:typecheck

      - name: Test Rust backend
        run: cargo test
        working-directory: src-tauri

      - name: Validate macOS signing secrets
        run: |
          has_cert=0
          if [ -n "$APPLE_CERTIFICATE" ] || [ -n "$APPLE_CERTIFICATE_PASSWORD" ] || [ -n "$KEYCHAIN_PASSWORD" ]; then
            has_cert=1
            missing=0
            for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD KEYCHAIN_PASSWORD; do
              if [ -z "${!name}" ]; then
                echo "::error::$name is required when Apple Developer signing is enabled."
                missing=1
              fi
            done
            if [ "$missing" -ne 0 ]; then
              exit 1
            fi
          fi

          if [ -n "$APPLE_ID" ] || [ -n "$APPLE_PASSWORD" ] || [ -n "$APPLE_TEAM_ID" ]; then
            if [ "$has_cert" -eq 0 ]; then
              echo "::error::Apple notarization requires Apple Developer signing secrets."
              exit 1
            fi

            missing=0
            for name in APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
              if [ -z "${!name}" ]; then
                echo "::error::$name is required for Apple ID notarization."
                missing=1
              fi
            done
            if [ "$missing" -ne 0 ]; then
              exit 1
            fi
          fi

          has_apple_id_notary=0
          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            has_apple_id_notary=1
          fi

          if [ -n "$APPLE_API_ISSUER" ] || [ -n "$APPLE_API_KEY" ] || [ -n "$APPLE_API_KEY_PRIVATE" ]; then
            if [ "$has_cert" -eq 0 ]; then
              echo "::error::App Store Connect notarization requires Apple Developer signing secrets."
              exit 1
            fi

            missing=0
            for name in APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_PRIVATE; do
              if [ -z "${!name}" ]; then
                echo "::error::$name is required for App Store Connect API notarization."
                missing=1
              fi
            done
            if [ "$missing" -ne 0 ]; then
              exit 1
            fi
          fi

          has_api_notary=0
          if [ -n "$APPLE_API_ISSUER" ] && [ -n "$APPLE_API_KEY" ] && [ -n "$APPLE_API_KEY_PRIVATE" ]; then
            has_api_notary=1
          fi

          if [ "$has_cert" -eq 1 ] && [ "$has_apple_id_notary" -eq 0 ] && [ "$has_api_notary" -eq 0 ]; then
            echo "::error::Apple Developer signing is configured, but notarization credentials are missing."
            exit 1
          fi

      - name: Use ad-hoc macOS signing
        if: env.APPLE_CERTIFICATE == ''
        run: echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"

      - name: Import Apple Developer certificate
        if: env.APPLE_CERTIFICATE != '' && env.APPLE_CERTIFICATE_PASSWORD != '' && env.KEYCHAIN_PASSWORD != ''
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "APPLE_SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Select Apple signing identity
        if: env.APPLE_CERTIFICATE != '' && env.APPLE_CERTIFICATE_PASSWORD != '' && env.KEYCHAIN_PASSWORD != ''
        run: |
          CERT_ID="$(security find-identity -v -p codesigning "$APPLE_SIGNING_KEYCHAIN" | awk -F '"' '
            /Developer ID Application/ { print $2; exit }
          ')"
          if [ -z "$CERT_ID" ]; then
            echo "No Developer ID Application signing identity was found in the imported certificate." >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "Selected Apple signing identity."

      - name: Prepare App Store Connect API key
        if: env.APPLE_API_ISSUER != '' && env.APPLE_API_KEY != '' && env.APPLE_API_KEY_PRIVATE != ''
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          API_KEY_PATH="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_PRIVATE" > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "VPScope ${{ github.ref_name }}"
          releaseBody: |
            Automated macOS build for VPScope.

            macOS artifacts are ad-hoc signed by default. Configure Apple Developer
            signing and notarization secrets to publish Gatekeeper-ready builds.

            This release is created as a draft so artifacts can be checked before publishing.
          releaseDraft: true
          prerelease: true
