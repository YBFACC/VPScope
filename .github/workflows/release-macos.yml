name: Release macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-macos:
    name: Build macOS release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm web:typecheck

      - name: Test Rust backend
        run: cargo test
        working-directory: src-tauri

      - name: Validate macOS release signing secrets
        if: vars.MACOS_RELEASE_SIGNING == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PRIVATE: ${{ secrets.APPLE_API_KEY_PRIVATE }}
        run: |
          missing=0

          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required when MACOS_RELEASE_SIGNING is true."
              missing=1
            fi
          done

          has_apple_id_notary=0
          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            has_apple_id_notary=1
          fi

          has_api_notary=0
          if [ -n "$APPLE_API_ISSUER" ] && [ -n "$APPLE_API_KEY" ] && [ -n "$APPLE_API_KEY_PRIVATE" ]; then
            has_api_notary=1
          fi

          if [ "$has_apple_id_notary" -eq 0 ] && [ "$has_api_notary" -eq 0 ]; then
            echo "::error::Notarization credentials are required when MACOS_RELEASE_SIGNING is true."
            echo "::error::Set APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID or APPLE_API_ISSUER, APPLE_API_KEY, APPLE_API_KEY_PRIVATE."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare App Store Connect API key
        if: vars.MACOS_RELEASE_SIGNING == 'true'
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PRIVATE: ${{ secrets.APPLE_API_KEY_PRIVATE }}
        run: |
          if [ -z "$APPLE_API_KEY" ] || [ -z "$APPLE_API_KEY_PRIVATE" ]; then
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/private_keys"
          API_KEY_PATH="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_PRIVATE" > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build and publish draft release
        if: vars.MACOS_RELEASE_SIGNING != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "VPScope ${{ github.ref_name }}"
          releaseBody: |
            Automated macOS build for VPScope.

            macOS artifacts are ad-hoc signed by default. Set the
            MACOS_RELEASE_SIGNING repository variable to true and configure
            Apple Developer signing/notarization secrets to publish
            Gatekeeper-ready builds.

            This release is created as a draft so artifacts can be checked before publishing.
          releaseDraft: true
          prerelease: true

      - name: Build and publish notarized draft release
        if: vars.MACOS_RELEASE_SIGNING == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "VPScope ${{ github.ref_name }}"
          releaseBody: |
            Automated macOS build for VPScope.

            macOS artifacts are ad-hoc signed by default. Configure Apple Developer
            signing and notarization secrets to publish Gatekeeper-ready builds.

            This release is created as a draft so artifacts can be checked before publishing.
          releaseDraft: true
          prerelease: true

      - name: Remove version from macOS DMG asset names
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" \
            --jq '.assets[] | select(.name | test("^VPScope_[0-9]+\\.[0-9]+\\.[0-9]+_[^/]+\\.dmg$")) | [.id, .name] | @tsv' |
          while IFS=$'\t' read -r asset_id asset_name; do
            new_name="$(printf '%s' "$asset_name" | sed -E 's/^VPScope_[0-9]+\.[0-9]+\.[0-9]+_(.+\.dmg)$/VPScope_\1/')"
            if [ "$asset_name" != "$new_name" ]; then
              gh api \
                --method PATCH \
                "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" \
                -f name="$new_name"
            fi
          done
